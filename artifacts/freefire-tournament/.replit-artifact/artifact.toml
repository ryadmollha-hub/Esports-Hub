kind = "web"
previewPath = "/"
title = "FF Arena"
version = "1.0.0"
id = "artifacts/freefire-tournament"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24250

[services.development]
run = "pnpm --filter @workspace/freefire-tournament run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/freefire-tournament", "run", "build" ]
serve = "static"
publicDir = "artifacts/freefire-tournament/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24250"
BASE_PATH = "/"
