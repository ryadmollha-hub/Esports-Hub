openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Free Fire Esports Tournament API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tournaments
    description: Tournament management
  - name: teams
    description: Team management
  - name: registrations
    description: Tournament registrations
  - name: matches
    description: Match results and schedule
  - name: leaderboard
    description: Leaderboard data
  - name: announcements
    description: Announcement system
  - name: users
    description: User management
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # TOURNAMENTS
  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List all tournaments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, ongoing, completed]
        - name: mode
          in: query
          schema:
            type: string
            enum: [solo, duo, squad]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentListResponse"
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a tournament (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/featured:
    get:
      operationId: getFeaturedTournaments
      tags: [tournaments]
      summary: Get featured/upcoming tournaments for home page
      responses:
        "200":
          description: Featured tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"

  /tournaments/{id}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get tournament details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
        "404":
          description: Not found
    patch:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update a tournament (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentUpdate"
      responses:
        "200":
          description: Updated tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
    delete:
      operationId: deleteTournament
      tags: [tournaments]
      summary: Delete a tournament (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tournaments/{id}/room:
    patch:
      operationId: updateTournamentRoom
      tags: [tournaments]
      summary: Upload room ID and password (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInfo"
      responses:
        "200":
          description: Room info updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  # REGISTRATIONS
  /tournaments/{id}/registrations:
    get:
      operationId: listRegistrationsForTournament
      tags: [registrations]
      summary: Get registrations for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
    post:
      operationId: registerForTournament
      tags: [registrations]
      summary: Register for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /registrations/{id}/approve:
    patch:
      operationId: approveRegistration
      tags: [registrations]
      summary: Approve a registration (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /registrations/{id}/reject:
    patch:
      operationId: rejectRegistration
      tags: [registrations]
      summary: Reject a registration (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /registrations/my:
    get:
      operationId: getMyRegistrations
      tags: [registrations]
      summary: Get current user registrations
      responses:
        "200":
          description: User registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"

  # TEAMS
  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}/join:
    post:
      operationId: requestJoinTeam
      tags: [teams]
      summary: Request to join a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Join request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teams/{id}/join-requests:
    get:
      operationId: getTeamJoinRequests
      tags: [teams]
      summary: Get join requests for a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Join requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /teams/{id}/members/{userId}/approve:
    patch:
      operationId: approveTeamMember
      tags: [teams]
      summary: Approve team join request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /teams/my:
    get:
      operationId: getMyTeam
      tags: [teams]
      summary: Get current user's team
      responses:
        "200":
          description: User's team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  # MATCHES
  /tournaments/{id}/matches:
    get:
      operationId: getTournamentMatches
      tags: [matches]
      summary: Get matches for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Matches list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a match (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Match created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}/results:
    patch:
      operationId: updateMatchResults
      tags: [matches]
      summary: Update match results (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchResultInput"
      responses:
        "200":
          description: Results updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/schedule:
    get:
      operationId: getMatchSchedule
      tags: [matches]
      summary: Get upcoming match schedule
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  # LEADERBOARD
  /tournaments/{id}/leaderboard:
    get:
      operationId: getTournamentLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /leaderboard/global:
    get:
      operationId: getGlobalLeaderboard
      tags: [leaderboard]
      summary: Get global player leaderboard
      responses:
        "200":
          description: Global leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ANNOUNCEMENTS
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: Announcements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  # USER PROFILE
  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ADMIN
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard analytics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /admin/users/{id}/ban:
    patch:
      operationId: banUser
      tags: [admin]
      summary: Ban a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/notifications:
    post:
      operationId: sendNotification
      tags: [admin]
      summary: Send notification to all users (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Tournament:
      type: object
      required: [id, name, mode, status, startDate, maxSlots, prizePool, entryFee]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        mode:
          type: string
          enum: [solo, duo, squad]
        status:
          type: string
          enum: [upcoming, ongoing, completed, cancelled]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        maxSlots:
          type: integer
        filledSlots:
          type: integer
        prizePool:
          type: number
        entryFee:
          type: number
        bannerUrl:
          type: ["string", "null"]
        roomId:
          type: ["string", "null"]
        roomPassword:
          type: ["string", "null"]
        countdownTo:
          type: ["string", "null"]
        createdAt:
          type: string

    TournamentDetail:
      type: object
      required: [id, name, mode, status, startDate, maxSlots, prizePool, entryFee]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        mode:
          type: string
          enum: [solo, duo, squad]
        status:
          type: string
          enum: [upcoming, ongoing, completed, cancelled]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        maxSlots:
          type: integer
        filledSlots:
          type: integer
        prizePool:
          type: number
        entryFee:
          type: number
        bannerUrl:
          type: ["string", "null"]
        roomId:
          type: ["string", "null"]
        roomPassword:
          type: ["string", "null"]
        countdownTo:
          type: ["string", "null"]
        createdAt:
          type: string
        prizes:
          type: array
          items:
            $ref: "#/components/schemas/PrizeTier"
        registrations:
          type: array
          items:
            $ref: "#/components/schemas/Registration"

    TournamentListResponse:
      type: object
      required: [tournaments, total]
      properties:
        tournaments:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        total:
          type: integer

    TournamentInput:
      type: object
      required: [name, mode, startDate, maxSlots, prizePool, entryFee]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        mode:
          type: string
          enum: [solo, duo, squad]
        startDate:
          type: string
        endDate:
          type: string
        maxSlots:
          type: integer
        prizePool:
          type: number
        entryFee:
          type: number
        bannerUrl:
          type: string
        countdownTo:
          type: string
        prizes:
          type: array
          items:
            $ref: "#/components/schemas/PrizeTierInput"

    TournamentUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        mode:
          type: string
          enum: [solo, duo, squad]
        status:
          type: string
          enum: [upcoming, ongoing, completed, cancelled]
        startDate:
          type: string
        endDate:
          type: string
        maxSlots:
          type: integer
        prizePool:
          type: number
        entryFee:
          type: number
        bannerUrl:
          type: string
        countdownTo:
          type: string

    PrizeTier:
      type: object
      required: [id, rank, amount]
      properties:
        id:
          type: integer
        rank:
          type: string
        amount:
          type: number
        description:
          type: ["string", "null"]

    PrizeTierInput:
      type: object
      required: [rank, amount]
      properties:
        rank:
          type: string
        amount:
          type: number
        description:
          type: string

    RoomInfo:
      type: object
      required: [roomId, roomPassword]
      properties:
        roomId:
          type: string
        roomPassword:
          type: string

    Registration:
      type: object
      required: [id, tournamentId, status, createdAt]
      properties:
        id:
          type: integer
        tournamentId:
          type: integer
        userId:
          type: string
        teamId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        freefireUid:
          type: string
        playerName:
          type: string
        paymentScreenshot:
          type: ["string", "null"]
        createdAt:
          type: string
        tournament:
          $ref: "#/components/schemas/Tournament"
        team:
          $ref: "#/components/schemas/Team"

    RegistrationInput:
      type: object
      required: [freefireUid, playerName]
      properties:
        freefireUid:
          type: string
          minLength: 1
        playerName:
          type: string
          minLength: 1
        teamId:
          type: integer
        paymentScreenshot:
          type: string

    Team:
      type: object
      required: [id, name, captainId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        tag:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        captainId:
          type: string
        totalWins:
          type: integer
        totalKills:
          type: integer
        createdAt:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"

    TeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        tag:
          type: string
        logoUrl:
          type: string

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        tag:
          type: string
        logoUrl:
          type: string

    TeamMember:
      type: object
      required: [id, userId, teamId, role, status]
      properties:
        id:
          type: integer
        userId:
          type: string
        teamId:
          type: integer
        role:
          type: string
          enum: [captain, member]
        status:
          type: string
          enum: [pending, active]
        freefireUid:
          type: ["string", "null"]
        playerName:
          type: ["string", "null"]

    Match:
      type: object
      required: [id, tournamentId, matchNumber, scheduledAt, status]
      properties:
        id:
          type: integer
        tournamentId:
          type: integer
        matchNumber:
          type: integer
        scheduledAt:
          type: string
        status:
          type: string
          enum: [scheduled, live, completed]
        mapName:
          type: ["string", "null"]
        createdAt:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/MatchResult"
        tournament:
          $ref: "#/components/schemas/Tournament"

    MatchInput:
      type: object
      required: [matchNumber, scheduledAt]
      properties:
        matchNumber:
          type: integer
        scheduledAt:
          type: string
        mapName:
          type: string

    MatchResult:
      type: object
      required: [id, matchId, rank, kills, points]
      properties:
        id:
          type: integer
        matchId:
          type: integer
        teamId:
          type: ["integer", "null"]
        userId:
          type: ["string", "null"]
        playerName:
          type: string
        rank:
          type: integer
        kills:
          type: integer
        points:
          type: integer

    MatchResultInput:
      type: object
      required: [results]
      properties:
        status:
          type: string
          enum: [live, completed]
        results:
          type: array
          items:
            $ref: "#/components/schemas/MatchResultEntry"

    MatchResultEntry:
      type: object
      required: [playerName, rank, kills, points]
      properties:
        teamId:
          type: integer
        userId:
          type: string
        playerName:
          type: string
        rank:
          type: integer
        kills:
          type: integer
        points:
          type: integer

    LeaderboardEntry:
      type: object
      required: [rank, playerName, kills, points, wins]
      properties:
        rank:
          type: integer
        userId:
          type: ["string", "null"]
        teamId:
          type: ["integer", "null"]
        playerName:
          type: string
        teamName:
          type: ["string", "null"]
        kills:
          type: integer
        points:
          type: integer
        wins:
          type: integer

    Announcement:
      type: object
      required: [id, title, content, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [info, warning, success, urgent]
        createdAt:
          type: string

