services:
  # ── Backend API (Express) ────────────────────────────────────────────────────
  - type: web
    name: ff-arena-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: >
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info

# ─── Database migrations ──────────────────────────────────────────────────────
# Run manually BEFORE deploying schema changes:
#   DATABASE_URL=<your-prod-url> pnpm --filter @workspace/db run push
#
# Never run drizzle-kit push automatically in the build command on Render.
# Doing so risks accidental data loss on every deploy.
